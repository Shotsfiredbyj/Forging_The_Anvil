<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1400"/>
<title>Cold Anvil — Workshop · Vibe A · dark + serif</title>
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="workshop-app.css?v=5"/>
<link rel="stylesheet" href="workshop-vision.css"/>
<style>
  body { margin: 0; }
  .cv-wrap { width: 1280px; height: 800px; border-radius: 10px; overflow: hidden;
    box-shadow: 0 14px 40px -20px rgba(0,0,0,0.35); border: 1px solid rgba(60,50,40,0.12); }
  .cv-wrap.mob { width: 360px; height: 720px; border-radius: 36px; padding: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="workshop-shared.jsx"></script>
<script type="text/babel" src="workshop-vA.jsx"></script>
<script type="text/babel" src="workshop-vision.jsx"></script>
<script type="text/babel" src="workshop-mobA.jsx"></script>

<script type="text/babel">
  const Wrap  = ({ children })      => <div className="cv-wrap">{children}</div>;
  const WrapM = ({ children })      => <div className="cv-wrap mob">{children}</div>;
  const D = (Comp) => <Wrap><Comp/></Wrap>;
  const M = (Comp) => <WrapM><Comp/></WrapM>;

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="vA-desk" title="Vibe A · desktop"
          subtitle="Bullfinch in the workshop — denser, mono ledger lines, glow accents on active rails.">
          <DCArtboard id="vA-mid"     label="Mid-conversation" width={1280} height={800}>{D(window.VA_MidConvo)}</DCArtboard>
          <DCArtboard id="vA-plan"    label="Plan stamped"     width={1280} height={800}>{D(window.VA_Plan)}</DCArtboard>
          <DCArtboard id="vA-vision"  label="Vision tab"       width={1280} height={800}>{D(window.VA_Vision)}</DCArtboard>
          <DCArtboard id="vA-preview" label="Live preview"     width={1280} height={800}>{D(window.VA_Preview)}</DCArtboard>
          <DCArtboard id="vA-dash"    label="Projects"         width={1280} height={800}>{D(window.VA_Dash)}</DCArtboard>
        </DCSection>

        <DCSection id="vA-mob" title="Vibe A · mobile"
          subtitle="Pocket version — same materials, two surfaces.">
          <DCArtboard id="vA-mob-convo" label="Conversation" width={360} height={720}>{M(window.Mob_A_Convo)}</DCArtboard>
          <DCArtboard id="vA-mob-dash"  label="Projects"     width={360} height={720}>{M(window.Mob_A_Dash)}</DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
